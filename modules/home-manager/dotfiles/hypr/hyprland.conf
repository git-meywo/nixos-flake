# autogenerated = 1

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/

monitor = DP-1, 1920x1080@60, 0x0, 1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

$terminal = kitty
$hyprlock = hyprlock
$appmenu = rofi -show drun

#################
### AUTOSTART ###
#################

exec-once = hyprpaper

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE, 24

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

general { 
    gaps_in = 5    
    gaps_out = 10

    no_border_on_floating = false

    border_size = 2

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true 

    allow_tearing = false

    layout = master
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 1.0
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    mfact = 0.5
    new_status = slave
}

misc { 
    force_default_wallpaper = 0
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############

input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    numlock_by_default = true

    follow_mouse = 1

    sensitivity = -0.8 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false

	middle_button_emulation = true

	tap-to-click = true
    }
}

gestures {
    workspace_swipe = false
}

####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "SUPER" key as main modifier.

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/
bind = $mainMod, A, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, M, exit,
bind = $mainMod, R, exec, $appmenu
bind = $mainMod, L, exec, $hyprlock
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -w 0)" - | swappy -f -

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + SHIFT + left/right
bind = $mainMod SHIFT, right, workspace, +1
bind = $mainMod SHIFT, left, workspace, -1

# Move active window to a workspace with mainMod + SHIFT + lelft/right
bind = $mainMod ALT, right, movetoworkspace, +1
bind = $mainMod ALT, left, movetoworkspace, -1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Master-Layout options
bind = $mainMod, S, layoutmsg, swapwithmaster
bind = $mainMod, D, layoutmsg, addmaster
bind = $mainMod, Q, layoutmsg, removemaster

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev2 = suppressevent maximize, class:.*
